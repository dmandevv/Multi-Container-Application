name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This "pulls" your code into the virtual machine
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-api:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-api:${{ github.sha }}
  deploy:
    needs: build-and-push # Only runs if the build was successful
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to your project folder on the server
            cd /path/to/your/project 
            
            # 2. Get the latest nginx.conf and docker-compose.prod.yml
            git pull origin main
            
            # 3. Pull the new image from Docker Hub
            docker compose -f docker-compose.prod.yml pull
            
            # 4. Restart the containers with the new image
            docker compose -f docker-compose.prod.yml up -d
